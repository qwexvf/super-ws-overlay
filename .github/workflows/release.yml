name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-v:refname | sed -n "/${TAG}/{ n; p; }" | head -1)
          if [ -n "$PREV" ]; then
            LOG=$(git log --pretty=format:"- %s" "${PREV}..${TAG}")
          else
            LOG=$(git log --pretty=format:"- %s")
          fi
          cat > /tmp/notes.md << NOTESEOF
          ## Changes

          ${LOG}

          ## Install

          \`\`\`bash
          hyprpm add https://github.com/qwexvf/super-ws-overlay
          hyprpm enable super-ws-overlay
          \`\`\`

          Or build manually: \`make && make install\`
          NOTESEOF
          sed -i 's/^          //' /tmp/notes.md

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file /tmp/notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
