name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ -n "$PREV" ] && [ "$PREV" != "$TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" "${PREV}..${TAG}")
          else
            LOG=$(git log --pretty=format:"- %s")
          fi
          DELIM=$(openssl rand -hex 8)
          {
            echo "notes<<${DELIM}"
            printf '## Changes\n\n%s\n\n' "$LOG"
            printf '## Install\n\n'
            printf '```bash\nhyprpm add https://github.com/qwexvf/super-ws-overlay\nhyprpm enable super-ws-overlay\n```\n\n'
            printf 'Or build manually: `make && make install`\n'
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --generate-notes=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
