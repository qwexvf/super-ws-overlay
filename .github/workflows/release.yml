name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ -n "$PREV" ] && [ "$PREV" != "$TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" "${PREV}..${TAG}")
          else
            LOG=$(git log --pretty=format:"- %s")
          fi
          {
            echo "notes<<EOF"
            echo "## What's changed"
            echo ""
            echo "$LOG"
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "hyprpm add https://github.com/qwexvf/super-ws-overlay"
            echo "hyprpm enable super-ws-overlay"
            echo '```'
            echo ""
            echo "Or build manually: \`make && make install\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --generate-notes=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
