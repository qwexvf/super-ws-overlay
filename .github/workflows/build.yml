name: Build

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm base-devel git hyprland pkg-config

      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Verify symbols
        run: |
          nm -D super-ws-overlay.so | grep -q pluginInit
          nm -D super-ws-overlay.so | grep -q pluginAPIVersion
